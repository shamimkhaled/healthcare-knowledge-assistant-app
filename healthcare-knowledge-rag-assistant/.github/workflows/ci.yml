name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: healthcare-knowledge-rag-assistant
        run: pip install -r requirements.txt

      - name: Lint
        working-directory: healthcare-knowledge-rag-assistant
        run: pip install ruff && ruff check app/

      - name: Build Docker image
        run: docker build -t healthcare-assistant -f healthcare-knowledge-rag-assistant/Dockerfile healthcare-knowledge-rag-assistant
